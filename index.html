<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POST DIAGNÓSTICO - Nivel 2</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --hacker-green: #00FF41;
            --hacker-dark: #0D0208;
            --glass-hacker: rgba(0, 20, 0, 0.85);
            --border-hacker: rgba(0, 255, 65, 0.3);
            --alert-red: #FF3B30;
            --warning-orange: #FF9500;
        }

        body {
            margin: 0; padding: 20px;
            background-color: var(--hacker-dark);
            color: var(--hacker-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        #game-container {
            background: var(--glass-hacker);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 35px; border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
            width: 100%; max-width: 500px; text-align: center;
            border: 1px solid var(--border-hacker);
            position: relative;
        }

        .hidden { display: none; }

        input {
            padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--hacker-green);
            width: 85%; font-size: 1.1rem; background: rgba(0,0,0,0.8);
            color: var(--hacker-green); text-align: center; outline: none;
            font-family: 'Courier New', Courier, monospace;
        }

        input::placeholder { color: rgba(0, 255, 65, 0.5); }

        .btn {
            background: transparent; color: var(--hacker-green); border: 1px solid var(--hacker-green);
            padding: 16px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px;
            font-weight: 600; font-size: 1.1rem; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px; font-family: 'Courier New', Courier, monospace;
        }

        .btn:hover {
            background: var(--hacker-green); color: var(--hacker-dark);
            box-shadow: 0 0 15px var(--hacker-green);
        }

        .level-tag {
            display: inline-block; padding: 6px 15px; border-radius: 4px;
            background: var(--hacker-green); color: var(--hacker-dark);
            font-size: 0.85rem; font-weight: bold; margin-bottom: 15px;
            letter-spacing: 1px;
        }

        #timer { font-size: 3.5rem; font-weight: bold; color: var(--alert-red); margin: 10px 0; text-shadow: 0 0 8px rgba(255, 59, 48, 0.5); }

        .emoji-box { font-size: 3.5rem; margin: 10px 0; }

        .opt-btn { 
            background: rgba(0, 30, 0, 0.7); color: var(--hacker-green); border: 1px solid var(--border-hacker); 
            margin-bottom: 10px; text-align: left; padding: 16px; font-weight: normal;
            font-family: 'Courier New', Courier, monospace; border-radius: 6px;
        }
        
        .opt-btn:hover { border-color: var(--hacker-green); background: rgba(0, 60, 0, 0.8); }

        .swal-hacker {
            background: #0a0a0a !important;
            color: var(--hacker-green) !important;
            border: 1px solid var(--hacker-green) !important;
            border-radius: 8px !important;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2) !important;
        }
        .swal-text-left { 
            text-align: left !important; font-size: 1rem !important; 
            font-family: 'Courier New', Courier, monospace; line-height: 1.6;
        }
        .swal2-timer-progress-bar { background: var(--hacker-green) !important; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="game-container">
    <div id="login">
        <div class="emoji-box">🖧</div>
        <h1 style="color: var(--hacker-green); margin: 0; text-shadow: 0 0 10px rgba(0,255,65,0.5);">SYSTEM_LOGIN</h1>
        <p style="color: var(--hacker-green); opacity: 0.8; margin-bottom: 25px;">[ 🌐 Network Administration 2.0 ]</p>
        <input type="text" id="nombre" placeholder="🆔 USER_FIRST_NAME">
        <input type="text" id="apellido" placeholder="🆔 USER_LAST_NAME">
        <button class="btn" onclick="startQuiz()">▶️ INITIALIZE_PHASE_2</button>
    </div>

    <div id="quiz" class="hidden">
        <div id="level-indicator" class="level-tag">🔓 ACCESS_LEVEL: FÁCIL</div>
        <div class="emoji-box" id="game-emoji">📡</div>
        <div id="timer">180</div>
        <h2 id="question-text" style="color: var(--hacker-green); font-size: 1.15rem; margin-bottom: 25px; line-height: 1.4;"></h2>
        <div id="options"></div>
    </div>
</div>

<script>
    // --- EFECTO MATRIX ---
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const characters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];
    for (let x = 0; x < columns; x++) drops[x] = 1;

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00FF41";
        ctx.font = fontSize + "px 'Courier New'";
        for (let i = 0; i < drops.length; i++) {
            const text = characters.charAt(Math.floor(Math.random() * characters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 35);

    // --- LÓGICA DEL JUEGO ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzImjlTsteO1Rlqle2JkgAJBvetUzhrTAwZ1nXKVMJyJM9MPwNDo20d19523_FT5cFcXg/exec'; // <--- PEGA TU NUEVA URL AQUÍ
    let nombre, apellido, score = 0, currentQ = 0, timer, timeLeft;

    // 30 PREGUNTAS NUEVAS
    const questions = [
        // FÁCIL
        { q: "📶 [Q-01] ¿Cuáles son las dos bandas de frecuencia más comunes en redes Wi-Fi?", a: ["1.2 GHz y 3.5 GHz", "2.4 GHz y 5 GHz", "900 MHz y 2.4 GHz"], c: 1, exp: "Las redes Wi-Fi modernas operan principalmente en las bandas de 2.4 GHz (mayor alcance, menor velocidad) y 5 GHz (menor alcance, mayor velocidad y menos interferencias)." },
        { q: "🧵 [Q-02] ¿Cuántos hilos de cobre tiene en su interior un cable UTP estándar?", a: ["4 hilos", "6 hilos", "8 hilos"], c: 2, exp: "Un cable UTP consta de 8 hilos de cobre aislados, agrupados en 4 pares trenzados para reducir la diafonía y la interferencia externa." },
        { q: "🖧 [Q-03] ¿Qué dispositivo se utiliza principalmente para dar cobertura inalámbrica a una red cableada?", a: ["Access Point (AP)", "Switch gestionable", "Módem ADSL"], c: 0, exp: "El Access Point (Punto de Acceso) actúa como un puente que conecta dispositivos inalámbricos a una red cableada." },
        { q: "🔒 [Q-04] ¿Cuál de los siguientes es el protocolo de seguridad más recomendado para una red Wi-Fi actual?", a: ["WEP", "WPA3", "Filtrado MAC"], c: 1, exp: "WPA3 es el estándar de seguridad inalámbrica más robusto en la actualidad. WEP es obsoleto y fácil de vulnerar." },
        { q: "🖥️ [Q-05] ¿Qué componente de hardware permite a una PC conectarse físicamente a la red?", a: ["CPU", "Tarjeta de Red (NIC)", "Memoria RAM"], c: 1, exp: "La NIC (Network Interface Card) o Tarjeta de Interfaz de Red proporciona la conexión de hardware física entre la computadora y el medio de red." },
        { q: "⚡ [Q-06] ¿Qué significa que un cable sea 'Directo' (Straight-through)?", a: ["Cruza los hilos de envío y recepción", "Usa la misma norma en ambos extremos", "Solo funciona con fibra óptica"], c: 1, exp: "Un cable directo utiliza la misma configuración de pines en ambos extremos (ej. T568B a T568B) y se usa para conectar equipos distintos, como una PC a un Switch." },
        { q: "🔌 [Q-07] ¿Qué significan las siglas RJ en RJ-45?", a: ["Registered Jack", "Routing Jumper", "Radio Junction"], c: 0, exp: "Registered Jack (Conector Registrado). Es un estándar internacional para interfaces de red física." },
        { q: "📏 [Q-08] ¿Qué herramienta es fundamental para verificar si un cable UTP recién armado funciona correctamente?", a: ["Pelacables", "Generador de tonos", "Tester o probador de red"], c: 2, exp: "El probador de red o Tester verifica la continuidad, los cortocircuitos y que el mapa de pines sea el correcto en ambos extremos." },
        { q: "🌐 [Q-09] En términos simples, ¿qué es una dirección IP?", a: ["La marca de la tarjeta de red", "Una dirección lógica para ubicar un equipo", "La velocidad máxima de la conexión"], c: 1, exp: "Es un identificador lógico y numérico asignado a cada dispositivo conectado a una red que utiliza el Protocolo de Internet para la comunicación." },
        { q: "🛡️ [Q-10] ¿Qué es el 'Blindaje' en un cable de red (como en el STP)?", a: ["Un software antivirus", "Una malla metálica que envuelve los cables", "Un conector de oro puro"], c: 1, exp: "El STP (Shielded Twisted Pair) incluye una malla o lámina de aluminio para proteger los datos de interferencias electromagnéticas (EMI)." },
        
        // MEDIO
        { q: "🔋 [Q-11] ¿Qué tecnología permite enviar datos y energía eléctrica por el mismo cable de red?", a: ["PoE (Power over Ethernet)", "VLAN", "QoS"], c: 0, exp: "PoE permite que los cables Ethernet suministren energía a dispositivos como cámaras IP o Access Points, eliminando la necesidad de enchufes cercanos." },
        { q: "🚪 [Q-12] ¿Cómo se le llama a la IP del router que permite a los equipos de una LAN salir a Internet?", a: ["Máscara de subred", "Servidor DNS", "Puerta de enlace (Default Gateway)"], c: 2, exp: "La Puerta de Enlace Predeterminada es el nodo (router) que sirve como punto de acceso a otra red externa, típicamente Internet." },
        { q: "🧩 [Q-13] ¿Qué tecnología permite dividir un Switch físico en múltiples redes lógicas independientes?", a: ["NAT", "VLAN (Virtual LAN)", "DHCP"], c: 1, exp: "Las VLANs permiten segmentar una red local a nivel de Capa 2, mejorando la seguridad y reduciendo el dominio de difusión (broadcast)." },
        { q: "🚪 [Q-14] ¿Qué puerto TCP se utiliza por defecto para conexiones seguras mediante SSH?", a: ["Puerto 21", "Puerto 22", "Puerto 23"], c: 1, exp: "El puerto 22 se asigna a SSH (Secure Shell), que permite el acceso remoto seguro a otros dispositivos. El 21 es FTP y el 23 Telnet." },
        { q: "🔄 [Q-15] ¿Para qué sirve la dirección IP de loopback (127.0.0.1)?", a: ["Para salir a Internet", "Para probar la propia tarjeta de red local", "Para configurar el router"], c: 1, exp: "Hacer ping a la dirección de bucle local (127.0.0.1) verifica que el stack TCP/IP y la tarjeta de red están funcionando correctamente en el propio equipo." },
        { q: "🔠 [Q-16] ¿En qué formato numérico se representan las direcciones IPv6?", a: ["Decimal", "Binario exclusivamente", "Hexadecimal"], c: 2, exp: "Debido a su longitud de 128 bits, IPv6 se representa en grupos de números y letras hexadecimales para acortar su escritura." },
        { q: "🔌 [Q-17] Menciona dos tipos de conectores muy comunes en Fibra Óptica:", a: ["RJ-11 y BNC", "LC y SC", "USB y DB-9"], c: 1, exp: "LC (Lucent Connector) y SC (Standard Connector) son estándares de terminación física muy utilizados en enlaces de fibra óptica." },
        { q: "⚡ [Q-18] ¿Cuál es la velocidad máxima teórica del cable UTP Categoría 5e a 100 metros?", a: ["100 Mbps", "1 Gbps (Gigabit)", "10 Gbps"], c: 1, exp: "La Categoría 5e (enhanced) fue diseñada para soportar velocidades de hasta 1 Gigabit por segundo (1000 Mbps) a una distancia de 100 metros." },
        { q: "📻 [Q-19] En la banda Wi-Fi de 2.4 GHz, ¿cuáles son los 3 canales que NO se superponen?", a: ["1, 6 y 11", "2, 4 y 8", "1, 2 y 3"], c: 0, exp: "Para evitar interferencias (Co-Channel Interference), se recomienda configurar los APs en los canales 1, 6 u 11, ya que su rango de frecuencia no se solapa." },
        { q: "🛡️ [Q-20] ¿Qué servicio de red traduce las direcciones IP privadas a una única IP pública para navegar?", a: ["ARP", "NAT (Network Address Translation)", "DNS"], c: 1, exp: "NAT permite que múltiples dispositivos de una red local (con IPs privadas) compartan una sola dirección IP pública para acceder a Internet." },
        
        // DIFÍCIL
        { q: "📖 [Q-21] ¿Cuál es la función del protocolo ARP?", a: ["Traducir IPs públicas", "Enlazar una dirección IP con una dirección MAC", "Asignar IPs automáticamente"], c: 1, exp: "El Protocolo de Resolución de Direcciones (ARP) descubre y vincula la dirección física (MAC) asociada a una dirección IP conocida en una red local." },
        { q: "🚀 [Q-22] A diferencia de TCP, ¿cuál es la característica principal del protocolo UDP?", a: ["Es orientado a conexión", "No garantiza la entrega ni el orden de los datos", "Cifra los paquetes"], c: 1, exp: "UDP es rápido pero 'best-effort'; no establece sesión previa ni retransmite paquetes perdidos, ideal para streaming de video o juegos en tiempo real." },
        { q: "📚 [Q-23] ¿Cuál es la Capa 7 del modelo OSI?", a: ["Capa de Red", "Capa de Presentación", "Capa de Aplicación"], c: 2, exp: "La Capa de Aplicación proporciona interfaces de red a las aplicaciones del usuario final, como navegadores web o clientes de correo electrónico." },
        { q: "🔢 [Q-24] Si una IP tiene el sufijo de subred /24 (Notación CIDR), ¿a qué máscara equivale?", a: ["255.0.0.0", "255.255.255.0", "255.255.0.0"], c: 1, exp: "El /24 significa que los primeros 24 bits de la máscara son '1', lo que en decimal corresponde exactamente a 255.255.255.0." },
        { q: "🕸️ [Q-25] En una topología de Malla (Mesh) completa, ¿cómo se conectan los nodos?", a: ["Todos conectados a un switch central", "Todos los nodos están conectados directamente entre sí", "Forman un círculo cerrado"], c: 1, exp: "En una malla completa, cada nodo tiene un enlace punto a punto con todos los demás, ofreciendo redundancia máxima ante caídas." },
        { q: "📉 [Q-26] ¿Qué es la 'Atenuación' en medios de transmisión?", a: ["Aceleración de datos", "Pérdida progresiva de la potencia de la señal por la distancia", "Colisión de paquetes"], c: 1, exp: "A medida que una señal eléctrica o luminosa viaja por el cable, pierde energía o amplitud. Si la atenuación es mucha, los datos se corrompen." },
        { q: "💥 [Q-27] ¿Qué método utilizaban las redes Ethernet antiguas (Hubs) para detectar y evitar colisiones?", a: ["CSMA/CD", "Token Ring", "OSPF"], c: 0, exp: "Carrier Sense Multiple Access with Collision Detection. Los equipos escuchaban el cable antes de transmitir y, si detectaban choque de datos, esperaban un tiempo aleatorio." },
        { q: "🆔 [Q-28] En una dirección MAC, ¿qué representan los primeros 24 bits (o 3 bytes)?", a: ["El número de serie del equipo", "El OUI (Identificador del fabricante)", "La red a la que pertenece"], c: 1, exp: "El OUI (Organizationally Unique Identifier) es asignado por el IEEE e identifica de manera única a la empresa que fabricó la tarjeta de red (ej. Cisco, Intel)." },
        { q: "🔬 [Q-29] En fibra óptica, ¿cuál es la principal diferencia entre Monomodo y Multimodo?", a: ["Monomodo usa cobre", "Monomodo permite que la luz viaje en un solo rayo directo (mayor distancia)", "Multimodo es para largas distancias oceánicas"], c: 1, exp: "La fibra monomodo (Single-mode) tiene un núcleo ínfimo que guía la luz láser en un solo camino recto, permitiendo transmisiones a muchísimos kilómetros sin pérdida." },
        { q: "📦 [Q-30] ¿Qué comando se utiliza en Windows para ver la tabla ARP local del equipo?", a: ["ipconfig /all", "arp -a", "netstat -r"], c: 1, exp: "El comando 'arp -a' despliega la caché de resolución de direcciones del sistema, mostrando qué IPs locales están asociadas a qué direcciones MAC." }
    ];

    function startQuiz() {
        nombre = document.getElementById('nombre').value.trim();
        apellido = document.getElementById('apellido').value.trim();
        if(!nombre || !apellido) return Swal.fire({ title: '⚠️ ACCESS_DENIED', text: 'Credenciales requeridas.', icon: 'error', confirmButtonText: 'REINTENTAR', customClass: { popup: 'swal-hacker' } });
        document.getElementById('login').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQuestion();
    }

    async function showQuestion() {
        if(currentQ >= questions.length) return endQuiz();
        
        if (currentQ === 10) {
            clearInterval(timer);
            document.getElementById('level-indicator').innerText = "🛡️ ACCESS_LEVEL: MEDIO";
            document.getElementById('level-indicator').style.background = "var(--warning-orange)";
            await Swal.fire({ title: '📈 LEVEL_UP', text: 'Entrando a configuraciones avanzadas y WiFi.', icon: 'info', confirmButtonText: 'PROCEED', customClass: { popup: 'swal-hacker' } });
        } else if (currentQ === 20) {
            clearInterval(timer);
            document.getElementById('level-indicator').innerText = "⚠️ ACCESS_LEVEL: CRÍTICO";
            document.getElementById('level-indicator').style.background = "var(--alert-red)";
            await Swal.fire({ title: '⚠️ CRITICAL_PHASE', text: 'Fase de enrutamiento y fibra óptica.', icon: 'warning', confirmButtonText: 'ACKNOWLEDGE', customClass: { popup: 'swal-hacker' } });
        }
        
        document.getElementById('game-emoji').innerText = "📡";
        timeLeft = 180;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('question-text').innerText = questions[currentQ].q;
        const opts = document.getElementById('options');
        opts.innerHTML = '';
        
        questions[currentQ].a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'btn opt-btn';
            b.innerText = `[>] ${opt}`;
            b.onclick = () => check(i);
            opts.appendChild(b);
        });

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) check(-1);
        }, 1000);
    }

    async function check(idx) {
        clearInterval(timer);
        const isCorrect = idx === questions[currentQ].c;
        const emoji = document.getElementById('game-emoji');
        
        if(isCorrect) {
            score += (timeLeft * 2) + 100;
            emoji.innerText = "✅";
        } else {
            emoji.innerText = "❌";
        }

        await Swal.fire({
            title: isCorrect ? '✅ DATA_VERIFIED' : '❌ SYSTEM_FAULT',
            html: `<div class="swal-text-left"><b>ℹ️ TARGET_DATA:</b> ${questions[currentQ].a[questions[currentQ].c]}<br><br><b>📊 TECHNICAL_ANALYSIS:</b><br>${questions[currentQ].exp}</div>`,
            icon: isCorrect ? 'success' : 'error',
            confirmButtonText: 'CONTINUE_PROTOCOL',
            confirmButtonColor: '#00FF41',
            allowOutsideClick: false,
            timer: 45000,
            timerProgressBar: true,
            customClass: { popup: 'swal-hacker' }
        });

        currentQ++;
        showQuestion();
    }

    function endQuiz() {
        const container = document.getElementById('quiz');
        container.innerHTML = "<h2 style='color:var(--hacker-green)'>⚙️ UPLOADING_RESULTS...</h2>";
        
        let formData = new FormData();
        formData.append('nombre', nombre);
        formData.append('apellido', apellido);
        formData.append('puntos', score);

        fetch(scriptURL, { method: 'POST', body: formData })
        .then(response => {
            container.innerHTML = `
                <h1 style="font-size: 3rem; color:var(--hacker-green)">🔒 SECURE_CONNECTION_CLOSED</h1>
                <h2 style="color:var(--hacker-green)">👤 Agent: ${nombre} ${apellido}</h2>
                <p style="color:var(--hacker-green); font-size: 1.2rem; font-weight: bold;">📈 Final_Score: ${score}</p>
                <button class="btn" onclick="location.reload()">🔄 RE-INITIALIZE_SYSTEM</button>
            `;
            Swal.fire({ title: '✅ OPERATION_COMPLETE', text: 'Resultados enviados exitosamente a la central.', icon: 'success', customClass: { popup: 'swal-hacker' } });
        })
        .catch(error => {
            console.error('Error!', error.message);
            Swal.fire({ title: '❌ SYSTEM_FAULT', text: 'Error de conexión. Contactar administrador.', icon: 'error', customClass: { popup: 'swal-hacker' } });
        });
    }
</script>
</body>
</html>
