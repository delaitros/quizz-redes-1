<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redes II: Primer Cuestionario</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --hacker-green: #00FF41;
            --hacker-dark: #0D0208;
            --glass-hacker: rgba(0, 20, 0, 0.85);
            --border-hacker: rgba(0, 255, 65, 0.3);
            --alert-red: #FF3B30;
            --warning-orange: #FF9500;
        }

        body {
            margin: 0; padding: 20px;
            background-color: var(--hacker-dark);
            color: var(--hacker-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* Canvas para el efecto Matrix */
        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        #game-container {
            background: var(--glass-hacker);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 35px; border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
            width: 100%; max-width: 500px; text-align: center;
            border: 1px solid var(--border-hacker);
            position: relative;
        }

        .hidden { display: none; }

        input {
            padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--hacker-green);
            width: 85%; font-size: 1.1rem; background: rgba(0,0,0,0.8);
            color: var(--hacker-green); text-align: center; outline: none;
            font-family: 'Courier New', Courier, monospace;
        }

        input::placeholder { color: rgba(0, 255, 65, 0.5); }

        .btn {
            background: transparent; color: var(--hacker-green); border: 1px solid var(--hacker-green);
            padding: 16px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px;
            font-weight: 600; font-size: 1.1rem; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px; font-family: 'Courier New', Courier, monospace;
        }

        .btn:hover {
            background: var(--hacker-green); color: var(--hacker-dark);
            box-shadow: 0 0 15px var(--hacker-green);
        }

        .level-tag {
            display: inline-block; padding: 6px 15px; border-radius: 4px;
            background: var(--hacker-green); color: var(--hacker-dark);
            font-size: 0.85rem; font-weight: bold; margin-bottom: 15px;
            letter-spacing: 1px;
        }

        #timer { font-size: 3.5rem; font-weight: bold; color: var(--alert-red); margin: 10px 0; text-shadow: 0 0 8px rgba(255, 59, 48, 0.5); }

        .emoji-box { font-size: 3.5rem; margin: 10px 0; }

        .opt-btn { 
            background: rgba(0, 30, 0, 0.7); color: var(--hacker-green); border: 1px solid var(--border-hacker); 
            margin-bottom: 10px; text-align: left; padding: 16px; font-weight: normal;
            font-family: 'Courier New', Courier, monospace; border-radius: 6px;
        }
        
        .opt-btn:hover { border-color: var(--hacker-green); background: rgba(0, 60, 0, 0.8); }

        /* Estilo profesional para los carteles SweetAlert */
        .swal-hacker {
            background: #0a0a0a !important;
            color: var(--hacker-green) !important;
            border: 1px solid var(--hacker-green) !important;
            border-radius: 8px !important;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2) !important;
        }
        .swal-text-left { 
            text-align: left !important; font-size: 1rem !important; 
            font-family: 'Courier New', Courier, monospace; line-height: 1.6;
        }
        .swal2-timer-progress-bar { background: var(--hacker-green) !important; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="game-container">
    <div id="login">
        <div class="emoji-box">🖥️</div>
        <h1 style="color: var(--hacker-green); margin: 0; text-shadow: 0 0 10px rgba(0,255,65,0.5);">SYSTEM_LOGIN</h1>
        <p style="color: var(--hacker-green); opacity: 0.8; margin-bottom: 25px;">[ 🌐 Network Administration 1.0 ]</p>
        <input type="text" id="nombre" placeholder="🆔 USER_FIRST_NAME">
        <input type="text" id="apellido" placeholder="🆔 USER_LAST_NAME">
        <button class="btn" onclick="startQuiz()">▶️ INITIALIZE_PROTOCOL</button>
    </div>

    <div id="quiz" class="hidden">
        <div id="level-indicator" class="level-tag">🔓 ACCESS_LEVEL: FÁCIL</div>
        <div class="emoji-box" id="game-emoji">📡</div>
        <div id="timer">180</div>
        <h2 id="question-text" style="color: var(--hacker-green); font-size: 1.15rem; margin-bottom: 25px; line-height: 1.4;"></h2>
        <div id="options"></div>
    </div>
</div>

<script>
    // --- EFECTO MATRIX ---
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const characters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];
    for (let x = 0; x < columns; x++) drops[x] = 1;

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00FF41";
        ctx.font = fontSize + "px 'Courier New'";
        for (let i = 0; i < drops.length; i++) {
            const text = characters.charAt(Math.floor(Math.random() * characters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 35);

    // --- LÓGICA DEL JUEGO ---
    const scriptURL = 'TU_URL_DE_GOOGLE_SCRIPT'; 
    let nombre, apellido, score = 0, currentQ = 0, timer, timeLeft;

    const questions = [
        // FÁCIL
        { q: "🔌 [Q-01] ¿Qué significa UTP?", a: ["Unshielded Twisted Pair", "Universal Twisted Port", "Unitary Total Port"], c: 0, exp: "UTP es 'Par Trenzado No Blindado'. Es el estándar para redes locales por su flexibilidad y bajo costo, aunque no tiene protección contra interferencias fuertes." },
        { q: "🔌 [Q-02] ¿Conector estándar para cableado de cobre?", a: ["RJ-11", "RJ-45", "BNC"], c: 1, exp: "El RJ-45 tiene 8 contactos y es el que usamos para redes Ethernet. El RJ-11 es más pequeño y se usa en telefonía." },
        { q: "🛠️ [Q-03] ¿Qué herramienta se utiliza para fijar el conector?", a: ["Soldador", "Crimpadora", "Pinza universal"], c: 1, exp: "La crimpadora presiona los contactos metálicos del conector sobre los hilos de cobre del cable para asegurar la conexión eléctrica." },
        { q: "🕸️ [Q-04] ¿Cuál es la topología que requiere un nodo central?", a: ["Bus", "Anillo", "Estrella"], c: 2, exp: "En la topología Estrella, todos los cables convergen a un Switch central. Es la más tolerante a fallos individuales de cable." },
        { q: "🛡️ [Q-05] ¿Qué medio de transmisión es inmune a interferencias electromagnéticas?", a: ["UTP", "Fibra Óptica", "Coaxial"], c: 1, exp: "La Fibra Óptica transmite pulsos de luz, no señales eléctricas. Por eso, el ruido electromagnético no altera los datos." },
        { q: "🖲️ [Q-06] ¿Qué dispositivo interconecta equipos dentro de una LAN?", a: ["Módem", "Switch", "Repetidor"], c: 1, exp: "El Switch conmutador reparte los datos de forma inteligente, utilizando las direcciones MAC para enviar la información al puerto correcto." },
        { q: "🏢 [Q-07] ¿Qué significan las siglas LAN?", a: ["Local Area Network", "Long Access Node", "Logical Area Net"], c: 0, exp: "Red de Área Local. Es una infraestructura de red que abarca un área geográfica reducida, como un edificio o campus." },
        { q: "🎨 [Q-08] ¿Qué color inicia la norma T568B?", a: ["Verde-Blanco", "Naranja-Blanco", "Azul"], c: 1, exp: "La norma T568B inicia con el par Naranja (Blanco-Naranja, Naranja). Es el estándar de cableado comercial predominante." },
        { q: "📡 [Q-09] ¿Cuál es la función del comando 'ping'?", a: ["Ver velocidad", "Probar conectividad", "Cerrar sesión"], c: 1, exp: "PING (Packet Internet Groper) envía paquetes de solicitud de eco ICMP a una IP objetivo para verificar la conectividad de red." },
        { q: "⏱️ [Q-10] ¿En qué unidad se mide la velocidad de transmisión de datos?", a: ["Hertz", "Bps (bits/seg)", "Watts"], c: 1, exp: "El ancho de banda digital se mide en bits por segundo (bps), y sus múltiplos comunes son Mbps y Gbps." },
        // MEDIO
        { q: "📦 [Q-11] ¿En qué capa del modelo OSI opera el Switch?", a: ["Capa 1", "Capa 2", "Capa 3"], c: 1, exp: "El Switch tradicional opera en la Capa 2 (Enlace de Datos) porque enruta la información basándose en direcciones MAC." },
        { q: "🤖 [Q-12] ¿Qué protocolo asigna configuraciones IP dinámicamente?", a: ["DNS", "DHCP", "FTP"], c: 1, exp: "El Protocolo de Configuración Dinámica de Host (DHCP) asigna IPs, máscaras y puertas de enlace automáticamente a los clientes." },
        { q: "📶 [Q-13] ¿Qué estándar IEEE define las redes inalámbricas (WiFi)?", a: ["802.3", "802.11", "802.5"], c: 1, exp: "La familia IEEE 802.11 engloba los estándares para redes de área local inalámbricas (WLAN)." },
        { q: "🔢 [Q-14] ¿Cuál es la máscara de subred por defecto para una Clase C?", a: ["255.0.0.0", "255.255.0.0", "255.255.255.0"], c: 2, exp: "La máscara 255.255.255.0 reserva 24 bits para identificar la red y 8 bits para los hosts (254 dispositivos útiles)." },
        { q: "🔗 [Q-15] En equipos antiguos, ¿qué cable conectaba dos Switches entre sí?", a: ["Cruzado", "Directo", "USB"], c: 0, exp: "Se requería un cable cruzado para conectar dispositivos de la misma capa. Hoy, la tecnología Auto-MDIX lo hace innecesario." },
        { q: "🌐 [Q-16] ¿Cuál es el puerto estándar asignado al protocolo HTTP?", a: ["21", "80", "443"], c: 1, exp: "El puerto 80 es el estándar para tráfico web no cifrado (HTTP). El puerto 443 se reserva para tráfico seguro (HTTPS)." },
        { q: "📍 [Q-17] ¿Cuál es la función principal de la Capa 3 (Red) del modelo OSI?", a: ["Física", "Enrutamiento", "Cifrado"], c: 1, exp: "La Capa de Red determina la mejor ruta para enviar paquetes desde el origen al destino utilizando direcciones IP lógicas." },
        { q: "📏 [Q-18] ¿Cuál es el límite máximo de distancia recomendado para un cable UTP?", a: ["50m", "100m", "500m"], c: 1, exp: "El estándar TIA/EIA establece un límite de 100 metros (90m de cable sólido + 10m de patch cords) para evitar la atenuación de la señal." },
        { q: "🆔 [Q-19] ¿Qué define a una dirección MAC?", a: ["Lógica y dinámica", "Física y única", "Protocolo de red"], c: 1, exp: "Media Access Control (MAC) es una dirección física de 48 bits, única a nivel global, grabada en el hardware de la tarjeta de red (NIC)." },
        { q: "⚡ [Q-20] ¿Qué categoría de cableado soporta 10 Gbps a una distancia de 55 metros?", a: ["Cat 5", "Cat 5e", "Cat 6"], c: 2, exp: "El cable Categoría 6 soporta frecuencias de hasta 250 MHz, permitiendo 10 Gigabit Ethernet en distancias limitadas." },
        // DIFÍCIL
        { q: "🚛 [Q-21] ¿Qué protocolo opera de forma orientada a conexión en la capa de Transporte?", a: ["IP", "TCP", "UDP"], c: 1, exp: "Transmission Control Protocol (TCP) establece una sesión y garantiza la entrega secuencial y sin errores de los paquetes." },
        { q: "🗺️ [Q-22] ¿Para qué se utiliza la utilidad 'traceroute' (o tracert)?", a: ["Ver ruta de saltos", "Limpiar caché DNS", "Medir latencia LAN"], c: 0, exp: "Traceroute rastrea y muestra la ruta completa de routers (saltos) que toma un paquete hasta alcanzar su destino en la red." },
        { q: "🌈 [Q-23] En una red Fast Ethernet (10/100 Mbps), ¿qué pares transmiten datos?", a: ["Azul/Marrón", "Naranja/Verde", "Los cuatro pares"], c: 1, exp: "Fast Ethernet solo utiliza los pines 1, 2, 3 y 6, que corresponden a los pares Naranja y Verde." },
        { q: "🔊 [Q-24] ¿A qué fenómeno hace referencia el término 'Crosstalk' (Diafonía)?", a: ["Pérdida de paquetes", "Interferencia entre pares", "Atenuación por distancia"], c: 1, exp: "Es la perturbación electromagnética que ocurre cuando la señal de un hilo induce ruido no deseado en un hilo adyacente." },
        { q: "0️⃣ [Q-25] ¿Cuál es la longitud en bits de una dirección IPv4?", a: ["32 bits", "64 bits", "128 bits"], c: 0, exp: "El protocolo IPv4 utiliza direcciones numéricas de 32 bits, generalmente expresadas en cuatro octetos decimales." },
        { q: "🚦 [Q-26] ¿Cuál es la función fundamental de un Router en la red?", a: ["Unir equipos en LAN", "Interconectar redes distintas", "Filtrar direcciones MAC"], c: 1, exp: "El enrutador interconecta redes lógicas diferentes (ej. una LAN corporativa y la WAN/Internet), basándose en tablas de enrutamiento IP." },
        { q: "📖 [Q-27] ¿Qué protocolo resuelve nombres de dominio legibles en direcciones IP?", a: ["ARP", "DNS", "ICMP"], c: 1, exp: "El Domain Name System (DNS) actúa como un directorio distribuido que traduce nombres (ej. servidor.com) a direcciones IP enrutables." },
        { q: "🌀 [Q-28] ¿Qué consecuencia técnica tiene exceder el radio de curvatura o la torsión de un cable UTP?", a: ["Acelera los electrones", "Mejora el blindaje", "Altera la impedancia"], c: 2, exp: "El maltrato físico del cable altera su estructura interna, modificando la impedancia y provocando reflexiones de señal e incremento del NEXT (Near-End Crosstalk)." },
        { q: "🧱 [Q-29] ¿Qué dispositivo de red opera exclusivamente en la Capa 1 del modelo OSI?", a: ["Hub (Concentrador)", "Switch gestionable", "Firewall SPI"], c: 0, exp: "El Hub opera a nivel físico regenerando y repitiendo la señal eléctrica a todos sus puertos sin examinar direcciones MAC ni IPs." },
        { q: "🔄 [Q-30] ¿Qué término describe la capacidad de un puerto para transmitir y recibir datos simultáneamente?", a: ["Simplex", "Full-Duplex", "Half-Duplex"], c: 1, exp: "En modo Full-Duplex, los dispositivos pueden enviar y recibir información de manera concurrente, eliminando el riesgo de colisiones en la red." }
    ];

    function startQuiz() {
        nombre = document.getElementById('nombre').value.trim();
        apellido = document.getElementById('apellido').value.trim();
        if(!nombre || !apellido) return Swal.fire({ title: '⚠️ ACCESS_DENIED', text: 'Credenciales de usuario requeridas.', icon: 'error', confirmButtonText: 'REINTENTAR', customClass: { popup: 'swal-hacker' } });
        document.getElementById('login').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQuestion();
    }

    async function showQuestion() {
        if(currentQ >= questions.length) return endQuiz();
        
        if (currentQ === 10) {
            clearInterval(timer);
            document.getElementById('level-indicator').innerText = "🛡️ ACCESS_LEVEL: MEDIO";
            document.getElementById('level-indicator').style.background = "var(--warning-orange)";
            await Swal.fire({ title: '📈 LEVEL_UP', text: 'Capa de protocolos desbloqueada. Iniciando fase intermedia.', icon: 'info', confirmButtonText: 'PROCEED', customClass: { popup: 'swal-hacker' } });
        } else if (currentQ === 20) {
            clearInterval(timer);
            document.getElementById('level-indicator').innerText = "⚠️ ACCESS_LEVEL: CRÍTICO";
            document.getElementById('level-indicator').style.background = "var(--alert-red)";
            await Swal.fire({ title: '⚠️ CRITICAL_PHASE', text: 'Entrando a nivel de administración de sistemas e infraestructura.', icon: 'warning', confirmButtonText: 'ACKNOWLEDGE', customClass: { popup: 'swal-hacker' } });
        }
        
        document.getElementById('game-emoji').innerText = "📡";
        timeLeft = 180;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('question-text').innerText = questions[currentQ].q;
        const opts = document.getElementById('options');
        opts.innerHTML = '';
        
        questions[currentQ].a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'btn opt-btn';
            b.innerText = `[>] ${opt}`;
            b.onclick = () => check(i);
            opts.appendChild(b);
        });

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) check(-1);
        }, 1000);
    }

    async function check(idx) {
        clearInterval(timer);
        const isCorrect = idx === questions[currentQ].c;
        const emoji = document.getElementById('game-emoji');
        
        if(isCorrect) {
            score += (timeLeft * 2) + 100;
            emoji.innerText = "✅";
        } else {
            emoji.innerText = "❌";
        }

        // Cartel explicativo obligatorio formal (45s)
        await Swal.fire({
            title: isCorrect ? '✅ DATA_VERIFIED' : '❌ SYSTEM_FAULT',
            html: `<div class="swal-text-left"><b>ℹ️ TARGET_DATA:</b> ${questions[currentQ].a[questions[currentQ].c]}<br><br><b>📊 TECHNICAL_ANALYSIS:</b><br>${questions[currentQ].exp}</div>`,
            icon: isCorrect ? 'success' : 'error',
            confirmButtonText: 'CONTINUE_PROTOCOL',
            confirmButtonColor: '#00FF41',
            allowOutsideClick: false,
            timer: 45000,
            timerProgressBar: true,
            customClass: { popup: 'swal-hacker' }
        });

        currentQ++;
        showQuestion();
    }

    function endQuiz() {
        const container = document.getElementById('quiz');
        container.innerHTML = "<h2 style='color:var(--hacker-green)'>⚙️ UPLOADING_RESULTS_TO_SERVER...</h2>";
        
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({nombre, apellido, puntos: score}) })
        .then(() => {
            container.innerHTML = `
                <h1 style="font-size: 3rem; color:var(--hacker-green)">🔒 SECURE_CONNECTION_CLOSED</h1>
                <h2 style="color:var(--hacker-green)">👤 Agent: ${nombre} ${apellido}</h2>
                <p style="color:var(--hacker-green); font-size: 1.2rem; font-weight: bold;">📈 Final_Score: ${score}</p>
                <button class="btn" onclick="location.reload()">🔄 RE-INITIALIZE_SYSTEM</button>
            `;
            Swal.fire({ title: '✅ OPERATION_COMPLETE', text: 'Resultados encriptados y enviados al servidor central (Google Sheets).', icon: 'success', customClass: { popup: 'swal-hacker' } });
        });
    }
</script>
</body>
</html>
