<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redes Challenge Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #F2F2F7;
            --ios-card: rgba(255, 255, 255, 0.8);
            --púrpura: #5856D6;
            --verde: #34C759;
            --rojo: #FF3B30;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            background-image: radial-gradient(circle at top right, #E5E5EA, #F2F2F7);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px;
        }
        #game-container {
            background: var(--ios-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%; max-width: 500px; text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .hidden { display: none; }
        h1 { font-weight: 700; letter-spacing: -1px; color: #1C1C1E; margin-bottom: 10px; }
        input {
            padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #C7C7CC;
            width: 90%; font-size: 1rem; background: rgba(255,255,255,0.5);
        }
        .btn {
            background: var(--ios-blue); color: white; border: none; padding: 16px;
            border-radius: 14px; cursor: pointer; width: 100%; margin-top: 15px;
            font-weight: 600; font-size: 1.1rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn:active { transform: scale(0.97); opacity: 0.8; }
        #timer { font-size: 3rem; font-weight: 700; color: var(--rojo); margin: 10px 0; font-variant-numeric: tabular-nums; }
        .level-badge {
            display: inline-block; padding: 6px 15px; border-radius: 20px;
            background: var(--púrpura); color: white; font-size: 0.8rem; font-weight: bold; margin-bottom: 15px;
        }
        .opt-btn { background: white; color: #1C1C1E; border: 1px solid #C7C7CC; margin-bottom: 10px; }
        .opt-btn:hover { background: #E5E5EA; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="login">
        <h1>🔌 Redes Master</h1>
        <p style="color: #8E8E93;">Instalación y Mantenimiento 1</p>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="apellido" placeholder="Apellido">
        <button class="btn" onclick="startQuiz()">Comenzar Reto</button>
    </div>

    <div id="quiz" class="hidden">
        <div id="level-indicator" class="level-badge">NIVEL: FÁCIL</div>
        <div style="font-weight: 600; color: #8E8E93; margin-bottom: 5px;">Puntos: <span id="score-val">0</span></div>
        <div id="timer">180</div>
        <h2 id="question-text" style="font-size: 1.4rem; margin-bottom: 25px;"></h2>
        <div id="options"></div>
    </div>
</div>

<script>
    const scriptURL = 'TU_URL_DE_GOOGLE_SCRIPT'; 
    let nombre, apellido, score = 0, currentQ = 0, timer, timeLeft;

    const questions = [
        // FÁCIL (0-9)
        { q: "¿Qué significa UTP?", a: ["Unshielded Twisted Pair", "Universal Twisted Port", "Unitary Total Port"], c: 0 },
        { q: "¿Cuál es el conector estándar para cables de cobre?", a: ["RJ-11", "RJ-45", "BNC"], c: 1 },
        { q: "¿Qué herramienta se usa para fijar el conector?", a: ["Soldador", "Crimpadora", "Pinza universal"], c: 1 },
        { q: "¿Cuál es la topología con un nodo central?", a: ["Bus", "Anillo", "Estrella"], c: 2 },
        { q: "¿Qué cable es inmune a interferencias?", a: ["UTP", "Fibra Óptica", "Coaxial"], c: 1 },
        { q: "¿Qué dispositivo conecta equipos en una LAN?", a: ["Módem", "Switch", "Repetidor"], c: 1 },
        { q: "¿Qué significan las siglas LAN?", a: ["Local Area Network", "Long Access Node", "Logical Area Net"], c: 0 },
        { q: "¿Color inicial en la norma T568B?", a: ["Verde-Blanco", "Naranja-Blanco", "Azul"], c: 1 },
        { q: "¿Para qué sirve el comando 'ping'?", a: ["Velocidad", "Conectividad", "Cerrar sesión"], c: 1 },
        { q: "¿Qué unidad mide la velocidad de transmisión?", a: ["Hertz", "Bps (bits/seg)", "Watts"], c: 1 },
        // MEDIO (10-19)
        { q: "¿En qué capa OSI trabaja el Switch?", a: ["Capa 1", "Capa 2", "Capa 3"], c: 1 },
        { q: "¿Protocolo que asigna IPs automáticamente?", a: ["DNS", "DHCP", "FTP"], c: 1 },
        { q: "¿Qué estándar define el WiFi?", a: ["802.3", "802.11", "802.5"], c: 1 },
        { q: "¿Máscara por defecto Clase C?", a: ["255.0.0.0", "255.255.0.0", "255.255.255.0"], c: 2 },
        { q: "¿Cable para conectar 2 Switches (Legacy)?", a: ["Cruzado", "Directo", "USB"], c: 0 },
        { q: "¿Puerto estándar HTTP?", a: ["21", "80", "443"], c: 1 },
        { q: "¿Función de Capa 3 OSI?", a: ["Física", "Enrutamiento", "Cifrado"], c: 1 },
        { q: "¿Límite de distancia cable UTP?", a: ["50m", "100m", "500m"], c: 1 },
        { q: "¿Qué es una dirección MAC?", a: ["Lógica", "Física única", "Tipo de IP"], c: 1 },
        { q: "¿Categoría para 10 Gbps (55m)?", a: ["Cat 5", "Cat 5e", "Cat 6"], c: 2 },
        // DIFÍCIL (20-29)
        { q: "¿Protocolo de capa de Transporte?", a: ["IP", "TCP", "Ethernet"], c: 1 },
        { q: "¿Función de 'Traceroute'?", a: ["Ruta de paquetes", "Caché", "Voltaje"], c: 0 },
        { q: "¿Pares que transmiten en 10/100?", a: ["Azul/Marrón", "Naranja/Verde", "Todos"], c: 1 },
        { q: "¿Qué es el 'Crosstalk'?", a: ["Velocidad", "Interferencia entre pares", "Falla"], c: 1 },
        { q: "¿Bits de una dirección IPv4?", a: ["32", "64", "128"], c: 0 },
        { q: "¿Función principal del Router?", a: ["Conectar cables", "Interconectar redes", "Amplificar"], c: 1 },
        { q: "¿Protocolo de resolución de nombres?", a: ["ARP", "DNS", "ICMP"], c: 1 },
        { q: "¿Efecto de torsión excesiva?", a: ["Nada", "Mejora", "Daño al cobre"], c: 2 },
        { q: "¿Dispositivo de Capa 1 OSI?", a: ["Hub", "Router", "Firewall"], c: 0 },
        { q: "¿Qué es Full-Duplex?", a: ["Solo envía", "Simultáneo", "Turnos"], c: 1 }
    ];

    function startQuiz() {
        nombre = document.getElementById('nombre').value.trim();
        apellido = document.getElementById('apellido').value.trim();
        if(!nombre || !apellido) return Swal.fire({title: 'Oops!', text: 'Necesitamos tu nombre', icon: 'info', confirmButtonColor: '#007AFF'});
        document.getElementById('login').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQuestion();
    }

    function updateLevel() {
        const badge = document.getElementById('level-indicator');
        if (currentQ === 10) {
            badge.innerText = "NIVEL: MEDIO";
            badge.style.background = "#FF9500";
            Swal.fire({title: '¡Nivel Medio!', text: 'Subiendo la dificultad...', icon: 'success', timer: 1500, showConfirmButton: false});
        } else if (currentQ === 20) {
            badge.innerText = "NIVEL: DIFÍCIL";
            badge.style.background = "#FF3B30";
            Swal.fire({title: '¡Nivel Experto!', text: '¡Demuestra lo que sabes!', icon: 'warning', timer: 1500, showConfirmButton: false});
        }
    }

    function showQuestion() {
        if(currentQ >= questions.length) return endQuiz();
        updateLevel();
        
        timeLeft = 180;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('question-text').innerText = questions[currentQ].q;
        const opts = document.getElementById('options');
        opts.innerHTML = '';
        
        questions[currentQ].a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'btn opt-btn';
            b.innerText = opt;
            b.onclick = () => check(i);
            opts.appendChild(b);
        });

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) check(-1);
        }, 1000);
    }

    function check(idx) {
        clearInterval(timer);
        const isCorrect = idx === questions[currentQ].c;
        
        if(isCorrect) {
            score += (timeLeft * 2) + 100;
            document.getElementById('score-val').innerText = score;
            Swal.fire({ title: '¡Correcto!', icon: 'success', timer: 800, showConfirmButton: false });
        } else {
            Swal.fire({ title: 'Incorrecto', text: 'La respuesta era: ' + questions[currentQ].a[questions[currentQ].c], icon: 'error', timer: 1500, showConfirmButton: false });
        }

        setTimeout(() => {
            currentQ++;
            showQuestion();
        }, 1600);
    }

    function endQuiz() {
        const container = document.getElementById('quiz');
        container.innerHTML = "<h2>Enviando resultados...</h2>";
        
        let feedback = score > 4000 ? "¡Increíble! Eres un experto en redes. 🚀" : "Buen intento, pero presta más atención en clase. 📚";
        let icon = score > 4000 ? "success" : "info";

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({nombre, apellido, puntos: score})
        }).then(() => {
            container.innerHTML = `
                <h1 style="font-size: 3rem;">🏆</h1>
                <h2>${nombre}, finalizaste el reto</h2>
                <p style="font-size: 1.2rem; font-weight: bold;">Puntaje: ${score}</p>
                <p>${feedback}</p>
                <button class="btn" onclick="location.reload()">Volver a intentar</button>
            `;
            Swal.fire({ title: '¡Terminaste!', text: feedback, icon: icon });
        });
    }
</script>
</body>
</html>
