<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 3: Infraestructura y Protocolos</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --hacker-green: #00FF41;
            --hacker-dark: #0D0208;
            --glass-hacker: rgba(0, 20, 0, 0.85);
            --border-hacker: rgba(0, 255, 65, 0.3);
            --alert-red: #FF3B30;
            --warning-orange: #FF9500;
        }

        body {
            margin: 0; padding: 20px;
            background-color: var(--hacker-dark);
            color: var(--hacker-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        #game-container {
            background: var(--glass-hacker);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 35px; border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
            width: 100%; max-width: 500px; text-align: center;
            border: 1px solid var(--border-hacker);
            position: relative;
        }

        .hidden { display: none; }

        input {
            padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--hacker-green);
            width: 85%; font-size: 1.1rem; background: rgba(0,0,0,0.8);
            color: var(--hacker-green); text-align: center; outline: none;
            font-family: 'Courier New', Courier, monospace;
        }

        input::placeholder { color: rgba(0, 255, 65, 0.5); }

        .btn {
            background: transparent; color: var(--hacker-green); border: 1px solid var(--hacker-green);
            padding: 16px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px;
            font-weight: 600; font-size: 1.1rem; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px; font-family: 'Courier New', Courier, monospace;
        }

        .btn:hover {
            background: var(--hacker-green); color: var(--hacker-dark);
            box-shadow: 0 0 15px var(--hacker-green);
        }

        .level-tag {
            display: inline-block; padding: 6px 15px; border-radius: 4px;
            background: var(--hacker-green); color: var(--hacker-dark);
            font-size: 0.85rem; font-weight: bold; margin-bottom: 15px;
            letter-spacing: 1px;
        }

        #timer { font-size: 3.5rem; font-weight: bold; color: var(--alert-red); margin: 10px 0; text-shadow: 0 0 8px rgba(255, 59, 48, 0.5); }

        .emoji-box { font-size: 3.5rem; margin: 10px 0; }

        .opt-btn { 
            background: rgba(0, 30, 0, 0.7); color: var(--hacker-green); border: 1px solid var(--border-hacker); 
            margin-bottom: 10px; text-align: left; padding: 16px; font-weight: normal;
            font-family: 'Courier New', Courier, monospace; border-radius: 6px;
        }
        
        .opt-btn:hover { border-color: var(--hacker-green); background: rgba(0, 60, 0, 0.8); }

        .swal-hacker {
            background: #0a0a0a !important;
            color: var(--hacker-green) !important;
            border: 1px solid var(--hacker-green) !important;
            border-radius: 8px !important;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2) !important;
        }
        .swal-text-left { 
            text-align: left !important; font-size: 1rem !important; 
            font-family: 'Courier New', Courier, monospace; line-height: 1.6;
        }
        .swal2-timer-progress-bar { background: var(--hacker-green) !important; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="game-container">
    <div id="login">
        <div class="emoji-box">🗄️</div>
        <h1 style="color: var(--hacker-green); margin: 0; text-shadow: 0 0 10px rgba(0,255,65,0.5);">SYSTEM_LOGIN</h1>
        <p style="color: var(--hacker-green); opacity: 0.8; margin-bottom: 25px;">[ 🌐 Evaluación de nivelación 3.0  - Protocolos]</p>
        <input type="text" id="nombre" placeholder="🆔 USER_FIRST_NAME">
        <input type="text" id="apellido" placeholder="🆔 USER_LAST_NAME">
        <button class="btn" onclick="startQuiz()">▶️ INITIALIZE_EXAM</button>
    </div>

    <div id="quiz" class="hidden">
        <div id="level-indicator" class="level-tag">🔓 ACCESS_LEVEL: FÁCIL</div>
        <div class="emoji-box" id="game-emoji">📡</div>
        <div id="timer">180</div>
        <h2 id="question-text" style="color: var(--hacker-green); font-size: 1.15rem; margin-bottom: 25px; line-height: 1.4;"></h2>
        <div id="options"></div>
    </div>
</div>

<script>
    // --- EFECTO MATRIX ---
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const characters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];
    for (let x = 0; x < columns; x++) drops[x] = 1;

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00FF41";
        ctx.font = fontSize + "px 'Courier New'";
        for (let i = 0; i < drops.length; i++) {
            const text = characters.charAt(Math.floor(Math.random() * characters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 35);

    // --- LÓGICA DEL JUEGO CON TU URL ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzImjlTsteO1Rlqle2JkgAJBvetUzhrTAwZ1nXKVMJyJM9MPwNDo20d19523_FT5cFcXg/exec'; 
    let nombre, apellido, score = 0, currentQ = 0, timer, timeLeft;

    const questions = [
        // FÁCIL - Infraestructura Básica y Conceptos
        { q: "🗄️ [Q-01] ¿Cuál es el ancho estándar de un Rack de comunicaciones?", a: ["15 pulgadas", "19 pulgadas", "24 pulgadas"], c: 1, exp: "El estándar internacional para el ancho de los equipos montables en racks de telecomunicaciones es de 19 pulgadas (aprox. 48 cm)." },
        { q: "🔌 [Q-02] ¿Qué función cumple un 'Patch Panel' o panel de parcheo?", a: ["Dar energía a los switches", "Organizar y terminar el cableado horizontal", "Proteger contra picos de voltaje"], c: 1, exp: "El Patch Panel centraliza y organiza los cables rígidos que vienen de las oficinas, permitiendo conectarlos de forma flexible al Switch usando cables cortos (patch cords)." },
        { q: "🌍 [Q-03] ¿Qué describen las siglas WAN?", a: ["Wide Area Network", "Wireless Access Node", "Web Assigned Network"], c: 0, exp: "Red de Área Amplia. Conecta múltiples LANs geográficamente dispersas, como la red de una empresa entre distintas ciudades, o la misma Internet." },
        { q: "🔋 [Q-04] ¿Por qué es vital instalar una UPS en el rack de red?", a: ["Para enfriar los equipos", "Para proveer energía de respaldo ante cortes", "Para acelerar la conexión a Internet"], c: 1, exp: "La UPS (Uninterruptible Power Supply) mantiene los equipos de red encendidos durante apagones cortos y los protege de variaciones de voltaje." },
        { q: "🏷️ [Q-05] En redes Wi-Fi, ¿qué es el SSID?", a: ["El nombre público de la red inalámbrica", "La contraseña del router", "El protocolo de cifrado"], c: 0, exp: "Service Set Identifier. Es el nombre técnico que se le da a la red Wi-Fi para que los usuarios puedan identificarla y conectarse a ella." },
        { q: "🧱 [Q-06] ¿Cómo se le llama comúnmente al conector RJ-45 hembra que va en la pared?", a: ["Plug", "Jack o Roseta", "Patch Cord"], c: 1, exp: "El Jack (o Keystone Jack) es el conector hembra fijo en las paredes o patch panels, mientras que el 'Plug' es el conector macho de los cables." },
        { q: "📟 [Q-07] A diferencia de un Tester de red, ¿para qué usarías un Multímetro en redes?", a: ["Verificar el mapa de pines", "Medir voltaje en fuentes de poder o PoE", "Medir la velocidad de descarga"], c: 1, exp: "El multímetro mide magnitudes eléctricas (voltaje, resistencia, continuidad) y es útil para descartar fallas de energía física en los equipos." },
        { q: "⚙️ [Q-08] ¿Cuál es la función principal de un Módem?", a: ["Modula y demodula la señal del proveedor (ISP)", "Reparte Wi-Fi a los celulares", "Filtra páginas web maliciosas"], c: 0, exp: "El módem traduce la señal analógica o de fibra del proveedor de Internet a una señal digital (Ethernet) que tu router o PC puede entender." },
        { q: "🛤️ [Q-09] ¿Qué norma de la TIA/EIA regula los espacios y canalizaciones para telecomunicaciones?", a: ["TIA/EIA-568", "TIA/EIA-569", "TIA/EIA-606"], c: 1, exp: "La norma 569 estandariza cómo deben construirse las rutas (canaletas, ductos, bandejas) y los cuartos de telecomunicaciones en un edificio comercial." },
        { q: "🧹 [Q-10] Al armar un cable UTP, ¿por qué NO se debe destrenzar demasiado el cable en el conector?", a: ["Porque no entra en el RJ-45", "Porque aumenta la interferencia y el ruido (Crosstalk)", "Porque el cable se corta"], c: 1, exp: "El trenzado anula las interferencias electromagnéticas. Si destrenzas más de 1.3 cm (media pulgada), la señal se degrada drásticamente en frecuencias altas." },

        // MEDIO - Protocolos y Hardware Intermedio
        { q: "🆘 [Q-11] Si tu PC obtiene la IP 169.254.x.x, ¿qué significa?", a: ["Es una IP pública de Internet", "Que hay un virus en la red", "APIPA: El servidor DHCP falló"], c: 2, exp: "APIPA (Automatic Private IP Addressing) es una IP que el sistema operativo se autoasigna cuando no puede encontrar un servidor DHCP en la red." },
        { q: "📁 [Q-12] ¿Qué protocolo y puerto se utilizan para la transferencia clásica de archivos?", a: ["HTTP (Puerto 80)", "FTP (Puerto 21)", "SMTP (Puerto 25)"], c: 1, exp: "File Transfer Protocol (FTP) utiliza el puerto 21 para establecer la conexión y el control, y el 20 para la transferencia de datos." },
        { q: "🧠 [Q-13] ¿Cómo sabe un Switch a qué puerto enviar los datos?", a: ["Lo envía a todos los puertos", "Consulta su tabla MAC (CAM Table)", "Usa las direcciones IP"], c: 1, exp: "El Switch aprende las direcciones físicas (MAC) de los equipos conectados y crea una tabla para enviar los tramas únicamente al puerto correcto." },
        { q: "🏠 [Q-14] ¿Cuál de las siguientes es una dirección IP Privada típica de Clase C?", a: ["8.8.8.8", "192.168.1.50", "172.16.0.10"], c: 1, exp: "El rango 192.168.0.0 a 192.168.255.255 está reservado para redes privadas locales (LAN) y no es enrutable en Internet." },
        { q: "📡 [Q-15] ¿Qué protocolo de red utiliza el comando PING para funcionar?", a: ["TCP", "UDP", "ICMP"], c: 2, exp: "El Internet Control Message Protocol (ICMP) se usa para enviar mensajes de error e información operativa, como las solicitudes de 'Echo' del Ping." },
        { q: "💡 [Q-16] ¿A qué estándar IEEE pertenece la tecnología PoE original (hasta 15.4W)?", a: ["802.1Q", "802.3af", "802.11ac"], c: 1, exp: "El estándar IEEE 802.3af define Power over Ethernet, permitiendo enviar corriente continua junto con los datos en cables UTP." },
        { q: "💻 [Q-17] En Windows, ¿qué comando muestra la IP, máscara y puerta de enlace?", a: ["ifconfig", "ipconfig", "netstat"], c: 1, exp: "En sistemas Windows, 'ipconfig' muestra la configuración de red actual. En sistemas basados en Linux/Unix se suele utilizar 'ifconfig' o 'ip a'." },
        { q: "🚇 [Q-18] ¿Qué tecnología crea un 'túnel cifrado' a través de una red pública como Internet?", a: ["VLAN", "VPN (Virtual Private Network)", "NAT"], c: 1, exp: "Una VPN extiende una red privada a través de una red pública, permitiendo a los usuarios enviar y recibir datos de forma segura como si estuvieran conectados directamente a la red privada." },
        { q: "🚦 [Q-19] Si conectas equipos con un HUB antiguo en lugar de un Switch, ¿en qué modo operan?", a: ["Full-Duplex", "Half-Duplex", "Simplex"], c: 1, exp: "Los Hubs comparten el mismo dominio de colisión, obligando a los equipos a operar en Half-Duplex (solo pueden enviar o recibir, no ambos al mismo tiempo)." },
        { q: "🚀 [Q-20] ¿Cuál es la principal mejora del cable Categoría 6a respecto al Categoría 6?", a: ["Soporta 10 Gbps a 100 metros completos", "Es más delgado y flexible", "Solo usa fibra de vidrio"], c: 0, exp: "Mientras que Cat 6 solo soporta 10 Gbps hasta 55 metros, Cat 6A (Augmented) reduce el Alien Crosstalk y mantiene los 10 Gbps en los 100 metros completos." },

        // DIFÍCIL - Diagnóstico Avanzado y Routing
        { q: "🔊 [Q-21] Al certificar un cableado, ¿qué mide el parámetro NEXT?", a: ["Velocidad de descarga", "Diafonía o ruido en el extremo cercano del cable", "La longitud total del cable"], c: 1, exp: "Near-End Crosstalk (NEXT) mide la interferencia de señal de un par de hilos hacia otro par adyacente en el mismo extremo donde se originó la señal." },
        { q: "📦 [Q-22] En redes Ethernet, ¿cuál es el tamaño estándar de la MTU?", a: ["1500 bytes", "9000 bytes", "128 bytes"], c: 0, exp: "Maximum Transmission Unit. Es el tamaño máximo del paquete de datos que puede transmitirse en una trama de red sin ser fragmentado (1500 bytes por defecto en Ethernet)." },
        { q: "🏷️ [Q-23] ¿Qué estándar IEEE se encarga del 'Tagging' o etiquetado de VLANs (Trunking)?", a: ["802.1X", "802.1Q", "802.3ad"], c: 1, exp: "El protocolo 802.1Q inserta una etiqueta (tag) en las tramas Ethernet para identificar a qué VLAN pertenece la información cuando viaja entre switches." },
        { q: "🔁 [Q-24] En el protocolo IPv6, ¿cómo se representa la dirección de Loopback (localhost)?", a: ["127.0.0.1", "::1", "FE80::"], c: 1, exp: "En IPv6, ::1 equivale funcionalmente a la dirección IPv4 127.0.0.1. Se utiliza para que un nodo se envíe paquetes a sí mismo para pruebas." },
        { q: "🗺️ [Q-25] Protocolos como OSPF o RIP son ejemplos de:", a: ["Protocolos de Enrutamiento Dinámico", "Protocolos de Capa Física", "Sistemas de Firewall"], c: 0, exp: "Permiten a los routers intercambiar información entre sí para aprender automáticamente las mejores rutas hacia otras redes, en lugar de configurarlas manualmente." },
        { q: "📉 [Q-26] Al medir la atenuación de una señal en cables o fibra, ¿qué unidad de medida se usa?", a: ["Voltios (V)", "Decibelios (dB)", "Ohmios (Ω)"], c: 1, exp: "La atenuación (pérdida de potencia de la señal) se mide en Decibelios. Un cable más largo o de mala calidad presentará mayor pérdida en dB." },
        { q: "⏱️ [Q-27] En redes (especialmente VoIP o Video), ¿qué es el 'Jitter'?", a: ["El ancho de banda máximo", "La variación o fluctuación en el tiempo de llegada de los paquetes", "La pérdida de paquetes descartados"], c: 1, exp: "El Jitter mide la irregularidad en la latencia. Si los paquetes de voz llegan con retrasos variables, la llamada se escuchará entrecortada o robótica." },
        { q: "🧱 [Q-28] ¿Cuál es la diferencia de un Firewall 'Stateful' respecto a uno 'Stateless'?", a: ["Es más económico", "Recuerda el estado de las conexiones activas", "No necesita dirección IP"], c: 1, exp: "Un firewall de inspección de estado (Stateful) rastrea y recuerda las sesiones de red activas, permitiendo el tráfico de retorno automáticamente si tú iniciaste la conexión." },
        { q: "🔬 [Q-29] ¿Qué equipo especializado se usa para buscar cortes exactos en un enlace de Fibra Óptica?", a: ["OTDR", "Fluke MicroScanner", "Generador de tonos"], c: 0, exp: "El OTDR (Reflectómetro Óptico en el Dominio de Tiempo) envía pulsos de luz y mide su reflejo para detectar con precisión a cuántos metros está la falla o el empalme." },
        { q: "🤝 [Q-30] El proceso TCP 'Three-Way Handshake' para establecer conexión consta de 3 pasos:", a: ["PING, PONG, ECHO", "SYN, SYN-ACK, ACK", "REQ, RES, DONE"], c: 1, exp: "Sincronización (SYN), Sincronización-Acuse (SYN-ACK) y Acuse de recibo (ACK). Así garantiza TCP que ambos equipos están listos para hablar antes de enviar datos." }
    ];

    function startQuiz() {
        nombre = document.getElementById('nombre').value.trim();
        apellido = document.getElementById('apellido').value.trim();
        if(!nombre || !apellido) return Swal.fire({ title: '⚠️ ACCESS_DENIED', text: 'Credenciales requeridas.', icon: 'error', confirmButtonText: 'REINTENTAR', customClass: { popup: 'swal-hacker' } });
        document.getElementById('login').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQuestion();
    }

    async function showQuestion() {
        if(currentQ >= questions.length) return endQuiz();
        
        if (currentQ === 10) {
            clearInterval(timer);
            document.getElementById('level-indicator').innerText = "🛡️ ACCESS_LEVEL: MEDIO";
            document.getElementById('level-indicator').style.background = "var(--warning-orange)";
            await Swal.fire({ title: '📈 LEVEL_UP', text: 'Entrando a protocolos y hardware intermedio.', icon: 'info', confirmButtonText: 'PROCEED', customClass: { popup: 'swal-hacker' } });
        } else if (currentQ === 20) {
            clearInterval(timer);
            document.getElementById('level-indicator').innerText = "⚠️ ACCESS_LEVEL: CRÍTICO";
            document.getElementById('level-indicator').style.background = "var(--alert-red)";
            await Swal.fire({ title: '⚠️ CRITICAL_PHASE', text: 'Fase de diagnóstico avanzado y routing.', icon: 'warning', confirmButtonText: 'ACKNOWLEDGE', customClass: { popup: 'swal-hacker' } });
        }
        
        document.getElementById('game-emoji').innerText = "📡";
        timeLeft = 180;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('question-text').innerText = questions[currentQ].q;
        const opts = document.getElementById('options');
        opts.innerHTML = '';
        
        questions[currentQ].a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'btn opt-btn';
            b.innerText = `[>] ${opt}`;
            b.onclick = () => check(i);
            opts.appendChild(b);
        });

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) check(-1);
        }, 1000);
    }

    async function check(idx) {
        clearInterval(timer);
        const isCorrect = idx === questions[currentQ].c;
        const emoji = document.getElementById('game-emoji');
        
        if(isCorrect) {
            score += (timeLeft * 2) + 100;
            emoji.innerText = "✅";
        } else {
            emoji.innerText = "❌";
        }

        await Swal.fire({
            title: isCorrect ? '✅ DATA_VERIFIED' : '❌ SYSTEM_FAULT',
            html: `<div class="swal-text-left"><b>ℹ️ TARGET_DATA:</b> ${questions[currentQ].a[questions[currentQ].c]}<br><br><b>📊 TECHNICAL_ANALYSIS:</b><br>${questions[currentQ].exp}</div>`,
            icon: isCorrect ? 'success' : 'error',
            confirmButtonText: 'CONTINUE_PROTOCOL',
            confirmButtonColor: '#00FF41',
            allowOutsideClick: false,
            timer: 45000,
            timerProgressBar: true,
            customClass: { popup: 'swal-hacker' }
        });

        currentQ++;
        showQuestion();
    }

    function endQuiz() {
        const container = document.getElementById('quiz');
        container.innerHTML = "<h2 style='color:var(--hacker-green)'>⚙️ UPLOADING_RESULTS...</h2>";
        
        // ENVÍO SEGURO DE DATOS COMO FORMULARIO A TU URL
        let formData = new FormData();
        formData.append('nombre', nombre);
        formData.append('apellido', apellido);
        formData.append('puntos', score);

        fetch(scriptURL, { method: 'POST', body: formData })
        .then(response => {
            container.innerHTML = `
                <h1 style="font-size: 3rem; color:var(--hacker-green)">🔒 SECURE_CONNECTION_CLOSED</h1>
                <h2 style="color:var(--hacker-green)">👤 Agent: ${nombre} ${apellido}</h2>
                <p style="color:var(--hacker-green); font-size: 1.2rem; font-weight: bold;">📈 Final_Score: ${score}</p>
                <button class="btn" onclick="location.reload()">🔄 RE-INITIALIZE_SYSTEM</button>
            `;
            Swal.fire({ title: '✅ OPERATION_COMPLETE', text: 'Resultados enviados exitosamente a tu Google Sheets.', icon: 'success', customClass: { popup: 'swal-hacker' } });
        })
        .catch(error => {
            console.error('Error!', error.message);
            Swal.fire({ title: '❌ SYSTEM_FAULT', text: 'Error de conexión. Verifica la configuración de Google Apps Script.', icon: 'error', customClass: { popup: 'swal-hacker' } });
        });
    }
</script>
</body>
</html>
