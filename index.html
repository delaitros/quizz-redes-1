<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redes Master: Liquid iOS Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --glass: rgba(255, 255, 255, 0.35);
            --border-glass: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
            background: linear-gradient(135deg, #001f3f 0%, #007AFF 50%, #5856D6 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        /* Fondo de logos WiFi */
        .wifi-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="white" opacity="0.06"><path d="M12 21l-12-18h24z"/></svg>');
            transform: rotate(-15deg) scale(1.8); pointer-events: none; z-index: -1;
        }

        #game-container {
            background: var(--glass);
            backdrop-filter: blur(35px) saturate(180%);
            -webkit-backdrop-filter: blur(35px) saturate(180%);
            padding: 35px; border-radius: 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4), inset 0 0 0 1px var(--border-glass);
            width: 100%; max-width: 460px; text-align: center;
            position: relative; cursor: grab;
        }

        #game-container:active { cursor: grabbing; }

        .hidden { display: none; }

        input {
            padding: 18px; margin: 10px 0; border-radius: 20px; border: none;
            width: 85%; font-size: 1.1rem; background: rgba(255, 255, 255, 0.7);
            text-align: center; outline: none;
        }

        .btn {
            background: var(--ios-blue); color: white; border: none; padding: 18px;
            border-radius: 20px; cursor: pointer; width: 100%; margin-top: 15px;
            font-weight: 600; font-size: 1.1rem; transition: 0.3s;
        }

        .level-tag {
            display: inline-block; padding: 6px 18px; border-radius: 50px;
            background: white; color: #1C1C1E; font-size: 0.8rem; font-weight: 800; margin-bottom: 10px;
        }

        #timer { font-size: 3.5rem; font-weight: 800; color: white; margin: 10px 0; }

        .emoji-box { font-size: 4.5rem; margin: 10px 0; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .opt-btn { 
            background: rgba(255,255,255,0.9); color: #1C1C1E; border: none; 
            margin-bottom: 12px; text-align: left; padding: 18px; font-weight: 500;
        }
        
        .opt-btn:hover { background: white; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="wifi-pattern"></div>

<div id="game-container">
    <div id="login">
        <div class="emoji-box">📶</div>
        <h1 style="color: white; margin: 0; letter-spacing: -1px;">Redes Master</h1>
        <p style="color: rgba(255,255,255,0.9); margin-bottom: 30px;">Instalación y Mantenimiento 1</p>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="apellido" placeholder="Apellido">
        <button class="btn" onclick="startQuiz()">Comenzar Reto</button>
    </div>

    <div id="quiz" class="hidden">
        <div id="level-indicator" class="level-tag">NIVEL: FÁCIL</div>
        <div class="emoji-box" id="game-emoji">🤔</div>
        <div id="timer">180</div>
        <h2 id="question-text" style="color: white; font-size: 1.4rem; margin-bottom: 25px;"></h2>
        <div id="options"></div>
    </div>
</div>

<script>
    const scriptURL = 'TU_URL_DE_GOOGLE_SCRIPT'; 
    let nombre, apellido, score = 0, currentQ = 0, timer, timeLeft;

    // Draggable Logic
    const container = document.getElementById('game-container');
    let isDragging = false; let offset = [0,0];
    container.onmousedown = (e) => {
        if(e.target.closest('button') || e.target.closest('input')) return;
        isDragging = true;
        offset = [container.offsetLeft - e.clientX, container.offsetTop - e.clientY];
    };
    document.onmousemove = (e) => {
        if (!isDragging) return;
        container.style.position = 'absolute';
        container.style.left = (e.clientX + offset[0]) + 'px';
        container.style.top = (e.clientY + offset[1]) + 'px';
    };
    document.onmouseup = () => isDragging = false;

    const questions = [
        // FÁCIL
        { q: "🔌 ¿Qué significa UTP?", a: ["Unshielded Twisted Pair", "Universal Twisted Port", "Unitary Total Port"], c: 0 },
        { q: "🔘 ¿Cuál es el conector estándar para cables de cobre?", a: ["RJ-11", "RJ-45", "BNC"], c: 1 },
        { q: "✂️ ¿Qué herramienta se usa para fijar el conector?", a: ["Soldador", "Crimpadora", "Pinza universal"], c: 1 },
        { q: "⭐ ¿Cuál es la topología con un nodo central?", a: ["Bus", "Anillo", "Estrella"], c: 2 },
        { q: "🛡️ ¿Qué cable es inmune a interferencias?", a: ["UTP", "Fibra Óptica", "Coaxial"], c: 1 },
        { q: "📟 ¿Qué dispositivo conecta equipos en una LAN?", a: ["Módem", "Switch", "Repetidor"], c: 1 },
        { q: "🏠 ¿Qué significan las siglas LAN?", a: ["Local Area Network", "Long Access Node", "Logical Area Net"], c: 0 },
        { q: "🎨 ¿Color inicial en la norma T568B?", a: ["Verde-Blanco", "Naranja-Blanco", "Azul"], c: 1 },
        { q: "📡 ¿Para qué sirve el comando 'ping'?", a: ["Velocidad", "Conectividad", "Cerrar sesión"], c: 1 },
        { q: "🏎️ ¿Qué unidad mide la velocidad de transmisión?", a: ["Hertz", "Bps (bits/seg)", "Watts"], c: 1 },
        // MEDIO
        { q: "📦 ¿En qué capa OSI trabaja el Switch?", a: ["Capa 1", "Capa 2", "Capa 3"], c: 1 },
        { q: "🤖 ¿Protocolo que asigna IPs automáticamente?", a: ["DNS", "DHCP", "FTP"], c: 1 },
        { q: "📶 ¿Qué estándar define el WiFi?", a: ["802.3", "802.11", "802.5"], c: 1 },
        { q: "🔢 ¿Máscara por defecto Clase C?", a: ["255.0.0.0", "255.255.0.0", "255.255.255.0"], c: 2 },
        { q: "🔗 ¿Cable para conectar 2 Switches (Legacy)?", a: ["Cruzado", "Directo", "USB"], c: 0 },
        { q: "🌐 ¿Puerto estándar HTTP?", a: ["21", "80", "443"], c: 1 },
        { q: "📍 ¿Función de Capa 3 OSI?", a: ["Física", "Enrutamiento", "Cifrado"], c: 1 },
        { q: "📏 ¿Límite de distancia cable UTP?", a: ["50m", "100m", "500m"], c: 1 },
        { q: "🆔 ¿Qué es una dirección MAC?", a: ["Lógica", "Física única", "Tipo de IP"], c: 1 },
        { q: "⚡ ¿Categoría para 10 Gbps (55m)?", a: ["Cat 5", "Cat 5e", "Cat 6"], c: 2 },
        // DIFÍCIL
        { q: "🚛 ¿Protocolo de capa de Transporte?", a: ["IP", "TCP", "Ethernet"], c: 1 },
        { q: "🗺️ ¿Función de 'Traceroute'?", a: ["Ruta de paquetes", "Caché", "Voltaje"], c: 0 },
        { q: "🌈 ¿Pares que transmiten en 10/100?", a: ["Azul/Marrón", "Naranja/Verde", "Todos"], c: 1 },
        { q: "🔊 ¿Qué es el 'Crosstalk'?", a: ["Velocidad", "Interferencia entre pares", "Falla"], c: 1 },
        { q: "0️⃣1️⃣ ¿Bits de una dirección IPv4?", a: ["32", "64", "128"], c: 0 },
        { q: "🚦 ¿Función principal del Router?", a: ["Conectar cables", "Interconectar redes", "Amplificar"], c: 1 },
        { q: "📖 ¿Protocolo de resolución de nombres?", a: ["ARP", "DNS", "ICMP"], c: 1 },
        { q: "🌀 ¿Efecto de torsión excesiva?", a: ["Nada", "Mejora", "Daño al cobre"], c: 2 },
        { q: "🧱 ¿Dispositivo de Capa 1 OSI?", a: ["Hub", "Router", "Firewall"], c: 0 },
        { q: "🔄 ¿Qué es Full-Duplex?", a: ["Solo envía", "Simultáneo", "Turnos"], c: 1 }
    ];

    function startQuiz() {
        nombre = document.getElementById('nombre').value.trim();
        apellido = document.getElementById('apellido').value.trim();
        if(!nombre || !apellido) return Swal.fire('Faltan Datos', 'Pon tu nombre para el diploma', 'info');
        document.getElementById('login').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQuestion();
    }

    async function showQuestion() {
        if(currentQ >= questions.length) return endQuiz();
        
        // Niveles con Botón de Aceptar
        if (currentQ === 10) {
            clearInterval(timer);
            document.getElementById('level-indicator').innerText = "NIVEL: MEDIO";
            document.getElementById('level-indicator').style.background = "#FF9500";
            await Swal.fire({ title: '📶 ¡Nivel Medio!', text: 'Dominaste lo básico. ¿Listo para más?', confirmButtonText: 'Aceptar' });
        } else if (currentQ === 20) {
            clearInterval(timer);
            document.getElementById('level-indicator').innerText = "NIVEL: DIFÍCIL";
            document.getElementById('level-indicator').style.background = "#FF3B30";
            await Swal.fire({ title: '🔥 ¡Nivel Experto!', text: 'Solo para maestros de las redes.', confirmButtonText: '¡Doy el nivel!' });
        }
        
        document.getElementById('game-emoji').innerText = "🤔";
        timeLeft = 180;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('question-text').innerText = questions[currentQ].q;
        const opts = document.getElementById('options');
        opts.innerHTML = '';
        
        questions[currentQ].a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'btn opt-btn';
            b.innerText = opt;
            b.onclick = () => check(i);
            opts.appendChild(b);
        });

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) check(-1);
        }, 1000);
    }

    function check(idx) {
        clearInterval(timer);
        const emoji = document.getElementById('game-emoji');
        const isCorrect = idx === questions[currentQ].c;
        
        if(isCorrect) {
            score += (timeLeft * 2) + 100;
            emoji.innerText = "😎";
        } else {
            emoji.innerText = "😭";
        }

        setTimeout(() => {
            currentQ++;
            showQuestion();
        }, 1300);
    }

    function endQuiz() {
        const container = document.getElementById('quiz');
        container.innerHTML = "<h2 style='color:white'>Subiendo puntaje...</h2>";
        
        let feedback = score > 4500 ? "¡Eres una leyenda de IT! 🚀" : "Te recomiendo estudiar un poco más. 📚";

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({nombre, apellido, puntos: score}) })
        .then(() => {
            container.innerHTML = `
                <h1 style="font-size: 4rem;">🏆</h1>
                <h2 style="color:white">${nombre}, Puntaje: ${score}</h2>
                <p style="color:white">${feedback}</p>
                <button class="btn" onclick="location.reload()">Reiniciar</button>
            `;
            Swal.fire('¡Felicidades!', feedback, score > 4500 ? 'success' : 'info');
        });
    }
</script>
</body>
</html>
